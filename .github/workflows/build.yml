name: build

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        working-directory: desktop
        run: npm ci

      - name: Fetch engine (mac)
        if: matrix.platform == 'mac'
        working-directory: desktop
        run: bash scripts/fetch-engine.sh mac

      - name: Fetch engine (windows)
        if: matrix.platform == 'win'
        shell: pwsh
        working-directory: desktop
        run: |
          $ver = if ($env:ZJU_VERSION) { $env:ZJU_VERSION } else { 'v1.1.1' }
          $base = "https://github.com/Mythologyli/zju-connect/releases/download/$ver"
          New-Item -ItemType Directory -Force -Path engine | Out-Null
          Invoke-WebRequest "$base/zju-connect-windows-amd64.zip" -OutFile a.zip
          Expand-Archive a.zip -DestinationPath tmp -Force
          $bin = Get-ChildItem -Recurse tmp -Filter zju-connect.exe | Select-Object -First 1
          Copy-Item $bin.FullName engine/zju-connect-windows-amd64.exe -Force

      # Only export CSC_LINK when a cert secret actually exists — an EMPTY CSC_LINK
      # makes electron-builder try (and fail) to read "" as a cert file.
      - name: Configure macOS signing
        if: matrix.platform == 'mac'
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          AID: ${{ secrets.APPLE_ID }}
          APW: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          ATID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$MAC_CSC_LINK" ]; then
            { echo "CSC_LINK=$MAC_CSC_LINK"; echo "CSC_KEY_PASSWORD=$MAC_CSC_KEY_PASSWORD";
              echo "CSC_IDENTITY_AUTO_DISCOVERY=true";
              echo "APPLE_ID=$AID"; echo "APPLE_APP_SPECIFIC_PASSWORD=$APW"; echo "APPLE_TEAM_ID=$ATID"; } >> "$GITHUB_ENV"
            echo "macOS: Developer ID signing + notarization"
          else
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
            echo "macOS: ad-hoc signing (no cert) — opens via right-click → Open"
          fi

      - name: Build (macOS dmg)
        if: matrix.platform == 'mac'
        working-directory: desktop
        run: npm run dist:mac

      - name: Configure Windows signing
        if: matrix.platform == 'win'
        shell: bash
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if [ -n "$WIN_CSC_LINK" ]; then
            { echo "CSC_LINK=$WIN_CSC_LINK"; echo "CSC_KEY_PASSWORD=$WIN_CSC_KEY_PASSWORD"; } >> "$GITHUB_ENV"
          fi

      - name: Build (Windows exe)
        if: matrix.platform == 'win'
        working-directory: desktop
        run: npm run dist:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hkustgzconnect-${{ matrix.platform }}
          path: |
            desktop/release/*.dmg
            desktop/release/*.exe
          if-no-files-found: warn

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/release/*.dmg
            desktop/release/*.exe
